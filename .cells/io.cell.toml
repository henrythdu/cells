name = "io"
purpose = "Read Cells state from disk (declarations, ownership, config, code files, payload sizes) + git ops for `crossings --diff` (isGitRepo, HEAD-tree extraction). (Import-edge collection lives in the importers cell.)"
provides = [
  "loadDeclarations",
  "loadOwnership",
  "loadConfig",
  "readFiles",
  "listCodeFiles",
  "neighborsOf",
  "computePayloadSize",
  "CELLS_DIR",
  "isGitRepo",
  "withHeadTree",
]
requires = ["declaration", "ownership", "payload", "config", "ignore"]

layer = 2
